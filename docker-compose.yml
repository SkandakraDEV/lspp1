
services:
  app:
    image: lspp1:1.8
    container_name: lspp1-app
    restart: unless-stopped
    ports:
      - "8001:80"
    depends_on:
      - db
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: lspp1_db
      DB_USERNAME: lspp1_user
      DB_PASSWORD: secret
    networks:
      - dokploy-network
      - lsp-network

  db:
    image: mariadb:11
    container_name: lspp1-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: lspp1_db
      MYSQL_USER: lspp1_user
      MYSQL_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - lsp-network

volumes:
  dbdata:

networks:
  dokploy-network:
    name: dokploy-network
    external: true
  lsp-network:
    name: lsp-network
